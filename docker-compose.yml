services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend/database.db:/app/database.db
      - ./backend/uploads:/app/uploads
    ports:
      - "${BACKEND_PORT}:5000"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT}:5173"
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped
